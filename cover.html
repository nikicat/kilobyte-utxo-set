<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>cover</title>
<style>
  * { box-sizing: border-box; margin: 0; }
  body { background: #555; display: grid; place-items: center; min-height: 100vh; }
  #cover {
    width: 1000px; height: 420px; position: relative; overflow: hidden;
    background: #f7f8f5; outline: 1px solid #dce3dd;
    font-family: system-ui, "Segoe UI", Roboto, sans-serif; color: #1d2620;
  }
  .watermark {
    position: absolute; right: -30px; bottom: -60px;
    font: 700 240px/1 ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    color: rgba(47,125,79,.06); letter-spacing: -.04em; user-select: none;
  }
  .left { position: absolute; left: 56px; top: 64px; width: 520px; }
  .eyebrow {
    font: 600 13px/1 ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    letter-spacing: .18em; color: #2f7d4f; text-transform: uppercase; margin-bottom: 22px;
  }
  h1 {
    font-family: "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, serif;
    font-size: 58px; line-height: 1.06; font-weight: 600; letter-spacing: -.015em;
    margin-bottom: 26px;
  }
  .stat {
    font: 600 26px/1 ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    color: #1d2620; margin-bottom: 18px;
  }
  .stat .old { color: #b3541e; }
  .stat .arrow { color: #8a978e; padding: 0 10px; }
  .stat .new { color: #1e5c38; background: #e3efe7; border-radius: 8px; padding: 4px 12px; }
  .sub { font-size: 17px; color: #5b6a61; line-height: 1.45; max-width: 430px; }
  /* forest */
  .forest { position: absolute; right: 24px; top: 40px; width: 400px; height: 340px; }
  .forest svg { position: absolute; inset: 0; }
  .forest svg line { stroke: #c3cec6; stroke-width: 1.5; }
  .node {
    position: absolute; transform: translate(-50%, -50%);
    border: 1.5px solid #c3cec6; background: #fff; border-radius: 9px;
    font: 500 14px/1 ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    padding: 7px 10px; white-space: nowrap; color: #5b6a61;
  }
  .node.leaf { border-radius: 999px; min-width: 38px; text-align: center; font-weight: 700; color: #1d2620; }
  .node.root { border-color: #2f7d4f; border-width: 2px; box-shadow: 0 0 0 4px #e3efe7; color: #1e5c38; }
  .node.sel { border-color: #b3541e; background: #f7e8dc; color: #b3541e; }
  .node.proof { border-color: #b3541e; border-style: dashed; box-shadow: 0 0 0 4px #f7e8dc; }
</style>
</head>
<body>
<div id="cover">
  <div class="watermark">110₂</div>
  <div class="left">
    <div class="eyebrow">bitcoin · validation · accumulators</div>
    <h1>The kilobyte<br>UTXO set</h1>
    <div class="stat"><span class="old">12 GB</span><span class="arrow">→</span><span class="new">~0.9 kB</span></div>
    <div class="sub">How Utreexo &amp; SwiftSync shrink Bitcoin's state — with an interactive Merkle-forest playground.</div>
  </div>
  <div class="forest">
    <svg width="400" height="340">
      <!-- 4-tree edges -->
      <line x1="120" y1="78"  x2="60"  y2="160"/>
      <line x1="120" y1="78"  x2="180" y2="160"/>
      <line x1="60"  y1="182" x2="30"  y2="262"/>
      <line x1="60"  y1="182" x2="90"  y2="262"/>
      <line x1="180" y1="182" x2="150" y2="262"/>
      <line x1="180" y1="182" x2="210" y2="262"/>
      <!-- 2-tree edges -->
      <line x1="315" y1="182" x2="285" y2="262"/>
      <line x1="315" y1="182" x2="345" y2="262"/>
    </svg>
    <div class="node root"  style="left:120px; top:70px;">H(a…d)</div>
    <div class="node"       style="left:60px;  top:170px;">H(a·b)</div>
    <div class="node proof" style="left:180px; top:170px;">H(c·d)</div>
    <div class="node leaf sel"   style="left:30px;  top:274px;">a</div>
    <div class="node leaf proof" style="left:90px;  top:274px;">b</div>
    <div class="node leaf"       style="left:150px; top:274px;">c</div>
    <div class="node leaf"       style="left:210px; top:274px;">d</div>
    <div class="node root"  style="left:315px; top:170px;">H(e·f)</div>
    <div class="node leaf"  style="left:285px; top:274px;">e</div>
    <div class="node leaf"  style="left:345px; top:274px;">f</div>
  </div>
</div>
</body>
</html>
